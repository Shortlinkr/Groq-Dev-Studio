<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Dev Team | Control Center</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🤖 AI Dev Team Orchestrator</h1>
            <p>Your serverless AI coding squad.</p>
        </header>

        <section id="setup">
            <h2>1. Setup API Keys</h2>
            <p class="hint">Keys are stored locally in your browser. They are never sent to a server.</p>
            
            <div class="key-group">
                <label>Google Gemini Key:</label>
                <input type="password" id="gemini-key" placeholder="Starts with AIza...">
                <a href="https://aistudio.google.com/app/apikey" target="_blank" class="guide-link">Get Key</a>
            </div>

            <div class="key-group">
                <label>Anthropic Claude Key:</label>
                <input type="password" id="claude-key" placeholder="Starts with sk-ant...">
                <a href="https://console.anthropic.com/settings/keys" target="_blank" class="guide-link">Get Key</a>
            </div>

            <div class="key-group">
                <label>OpenAI (GPT) Key:</label>
                <input type="password" id="openai-key" placeholder="Starts with sk-proj...">
                <a href="https://platform.openai.com/api-keys" target="_blank" class="guide-link">Get Key</a>
            </div>

            <button id="save-keys-btn">Save Keys to Browser</button>
        </section>

        <hr>

        <section id="output-section">
            <h2>2. Final Project Code</h2>
            <div id="status-bar">Status: <span id="status-text">Waiting for keys...</span></div>
            <pre id="code-display"><code>// Code generated by the AI team will appear here...</code></pre>
            <button id="copy-btn">Copy Code</button>
        </section>
    </div>

    <script src="app.js"></script>
</body>
</html>
