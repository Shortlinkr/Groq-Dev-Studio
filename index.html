<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Team | Serverless Dev Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code&family=Inter:wght@400;600&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f1f5f9; }
        .code-font { font-family: 'Fira Code', monospace; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 4px; }
        .typing-indicator::after { content: '...'; animation: ellipsis 1.5s infinite; }
        @keyframes ellipsis { 0% { content: '.'; } 33% { content: '..'; } 66% { content: '...'; } }
        .debug-panel { font-size: 10px; color: #64748b; border-top: 1px solid #1e293b; margin-top: 10px; padding-top: 10px; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-8 border-b border-slate-800 pb-4">
            <div>
                <h1 class="text-2xl font-bold text-sky-400">AI Team Orchestrator</h1>
                <p class="text-slate-400 text-sm">One Key. Multi-Agent. Secure Local Execution.</p>
            </div>
            <div id="status-pill" class="px-3 py-1 rounded-full bg-slate-800 text-xs border border-slate-700 transition-colors">
                ⚪ Awaiting Key
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <aside class="space-y-6">
                <!-- API Key Section -->
                <div class="bg-slate-900 p-6 rounded-xl border border-slate-800">
                    <h2 class="text-lg font-semibold mb-4 flex justify-between">
                        <span>🔑 OpenRouter Vault</span>
                        <span id="key-status-icon" class="text-slate-500">❌</span>
                    </h2>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-xs uppercase text-slate-500 font-bold mb-1">Your API Key</label>
                            <input type="password" id="openrouter-key" class="w-full bg-slate-950 border border-slate-700 rounded p-2 text-sm focus:border-sky-500 outline-none" placeholder="sk-or-...">
                        </div>
                        <button id="save-btn" class="w-full bg-slate-800 hover:bg-slate-700 text-white font-bold py-2 rounded transition">
                            Save to Browser Storage
                        </button>
                    </div>
                </div>

                <!-- Project Request -->
                <div class="bg-slate-900 p-6 rounded-xl border border-slate-800">
                    <h2 class="text-lg font-semibold mb-4 text-sky-400">🚀 Create App</h2>
                    <textarea id="project-desc" rows="5" class="w-full bg-slate-950 border border-slate-700 rounded p-3 text-sm focus:border-sky-500 outline-none" placeholder="Describe a clean, safe app idea..."></textarea>
                    
                    <div class="mt-4 p-3 bg-slate-950/50 rounded border border-slate-800 space-y-3">
                        <div class="flex items-center justify-between">
                            <span class="text-xs text-slate-400">Model Pair</span>
                            <select id="model-preset" class="bg-slate-800 text-[10px] rounded border border-slate-700 p-1">
                                <option value="gemini">Google Gemini 2.0 Flash</option>
                                <option value="llama">Llama 3.1 70B (Fast)</option>
                                <option value="deepseek">DeepSeek V3 (Coding)</option>
                            </select>
                        </div>
                        <div class="flex items-center justify-between">
                            <span class="text-xs text-slate-400">Network Mode</span>
                            <select id="request-mode" class="bg-slate-800 text-[10px] rounded border border-slate-700 p-1">
                                <option value="minimal">Minimal Headers (Safest)</option>
                                <option value="standard">Standard</option>
                            </select>
                        </div>
                    </div>

                    <button id="start-team" class="w-full mt-4 bg-sky-600 hover:bg-sky-500 text-white font-bold py-3 rounded transition shadow-lg shadow-sky-900/20 disabled:opacity-50">
                        Summon the Team
                    </button>
                    
                    <div class="debug-panel">
                        <strong>Last Status:</strong> <span id="debug-status">Idle</span><br>
                        <strong>Last Error:</strong> <span id="debug-error" class="text-red-400">None</span>
                    </div>
                </div>
            </aside>

            <!-- Main Log and Output -->
            <main class="lg:col-span-2 space-y-6">
                <div class="bg-slate-900 rounded-xl border border-slate-800 flex flex-col h-[300px]">
                    <div class="p-4 border-b border-slate-800 bg-slate-800/30 rounded-t-xl flex justify-between">
                        <h2 class="text-xs font-bold uppercase tracking-widest text-slate-400">Execution Log</h2>
                        <span id="loader" class="hidden text-sky-500 text-xs animate-pulse font-bold">WORKING</span>
                    </div>
                    <div id="activity-log" class="flex-1 overflow-y-auto p-4 space-y-3 text-sm font-mono">
                        <div class="text-slate-500 italic">Ready for project input.</div>
                    </div>
                </div>

                <div class="bg-black rounded-xl border border-slate-800 flex flex-col min-h-[450px]">
                    <div class="p-3 bg-slate-900 border-b border-slate-800 flex justify-between items-center">
                        <span class="text-xs font-bold text-slate-400">OUTPUT_PREVIEW</span>
                        <button id="copy-code" class="text-xs px-3 py-1 rounded bg-slate-800 hover:bg-slate-700 transition">Copy Code</button>
                    </div>
                    <pre id="code-output" class="p-6 text-sm code-font overflow-auto flex-1 text-sky-300/90 leading-relaxed m-0"><code>// Generated code will appear here...</code></pre>
                </div>
            </main>
        </div>
    </div>

    <script>
        const activityLog = document.getElementById('activity-log');
        const codeOutput = document.getElementById('code-output');
        const btnStart = document.getElementById('start-team');
        const loader = document.getElementById('loader');
        const debugStatus = document.getElementById('debug-status');
        const debugError = document.getElementById('debug-error');
        
        let apiKey = '';

        window.onload = () => {
            const saved = localStorage.getItem('or_vault');
            if (saved) {
                apiKey = saved;
                document.getElementById('openrouter-key').value = saved;
                updateKeyUI(true);
            }
        };

        document.getElementById('save-btn').addEventListener('click', () => {
            apiKey = document.getElementById('openrouter-key').value.trim();
            localStorage.setItem('or_vault', apiKey);
            updateKeyUI(!!apiKey);
            addLog('SYSTEM', 'Local Vault updated.', 'text-green-400');
        });

        function updateKeyUI(ready) {
            document.getElementById('status-pill').innerHTML = ready ? '🟢 Ready' : '⚪ Missing Key';
            document.getElementById('key-status-icon').innerText = ready ? '✅' : '❌';
        }

        function addLog(role, message, colorClass, isThinking = false) {
            const div = document.createElement('div');
            div.className = `p-3 rounded bg-slate-950/50 border-l-2 border-slate-700 ${colorClass} text-xs`;
            div.innerHTML = `<span class="font-bold text-slate-500 mb-1 block uppercase text-[10px]">${role}</span><span class="${isThinking ? 'typing-indicator' : ''}">${message}</span>`;
            activityLog.appendChild(div);
            activityLog.scrollTop = activityLog.scrollHeight;
            return div;
        }

        async function callAI(model, system, user) {
            const mode = document.getElementById('request-mode').value;
            
            const headers = {
                'Authorization': `Bearer ${apiKey}`,
                'Content-Type': 'application/json'
            };
            
            if (mode === 'standard') {
                headers['HTTP-Referer'] = window.location.href;
                headers['X-Title'] = 'AI Dev Studio';
            }

            debugStatus.innerText = `Connecting to ${model}...`;
            
            try {
                const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                    method: 'POST',
                    headers: headers,
                    body: JSON.stringify({
                        model: model,
                        messages: [
                            { role: 'system', content: system },
                            { role: 'user', content: user }
                        ]
                    })
                });

                const data = await response.json();
                
                if (!response.ok) {
                    // Try to extract the deep error message
                    const msg = data.error?.metadata?.raw || data.error?.message || `HTTP ${response.status}`;
                    throw new Error(msg);
                }
                
                return data.choices[0].message.content;
            } catch (err) {
                debugError.innerText = err.message;
                throw err;
            }
        }

        btnStart.addEventListener('click', async () => {
            const desc = document.getElementById('project-desc').value.trim();
            if (!desc || !apiKey) return alert("Please check your prompt and API key.");

            btnStart.disabled = true;
            loader.classList.remove('hidden');
            activityLog.innerHTML = "";
            codeOutput.innerText = "// Connecting to AI team...";
            debugError.innerText = "None";

            const preset = document.getElementById('model-preset').value;
            
            // Map presets to specific OpenRouter IDs
            const models = {
                gemini: 'google/gemini-flash-1.5-exp',
                llama: 'meta-llama/llama-3.1-70b-instruct:free',
                deepseek: 'deepseek/deepseek-chat'
            };

            try {
                // ARCHITECT
                addLog('ARCHITECT', `Consulting ${preset} architect...`, 'text-purple-400', true);
                const plan = await callAI(
                    models[preset],
                    'You are an expert systems architect. Design a technical plan for a single-file HTML/Tailwind/JS app. Keep it safe and clean.',
                    desc
                );
                addLog('SYSTEM', 'Blueprint finalized.', 'text-slate-500');

                // CODER
                addLog('LEAD CODER', `Building with ${preset}...`, 'text-sky-400', true);
                const code = await callAI(
                    models[preset],
                    'You are a senior coder. Output ONLY raw HTML code. No markdown, no intro text.',
                    `Build this specific plan: ${plan}`
                );

                const cleanCode = code.replace(/```html|```/gi, '').trim();
                codeOutput.innerText = cleanCode;
                addLog('SYSTEM', 'Success! Project generated.', 'text-green-400');
                debugStatus.innerText = "Done";

            } catch (e) {
                addLog('ERROR', `Connection failed. Check Debug Panel.`, 'text-red-500');
                debugStatus.innerText = "Failed";
            } finally {
                btnStart.disabled = false;
                loader.classList.add('hidden');
            }
        });

        document.getElementById('copy-code').addEventListener('click', () => {
            const text = codeOutput.innerText;
            const temp = document.createElement('textarea');
            temp.value = text;
            document.body.appendChild(temp);
            temp.select();
            document.execCommand('copy');
            document.body.removeChild(temp);
            alert("Code copied!");
        });
    </script>
</body>
</html>
