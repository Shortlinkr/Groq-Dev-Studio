<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Team | Serverless Dev Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code&family=Inter:wght@400;600&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f1f5f9; }
        .code-font { font-family: 'Fira Code', monospace; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 4px; }
        .typing-indicator::after { content: '...'; animation: ellipsis 1.5s infinite; }
        @keyframes ellipsis { 0% { content: '.'; } 33% { content: '..'; } 66% { content: '...'; } }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-8 border-b border-slate-800 pb-4">
            <div>
                <h1 class="text-2xl font-bold text-sky-400">AI Team Orchestrator</h1>
                <p class="text-slate-400 text-sm">One Key. Two Agents. Zero Servers.</p>
            </div>
            <div id="status-pill" class="px-3 py-1 rounded-full bg-slate-800 text-xs border border-slate-700 transition-colors">
                ⚪ Awaiting Key
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <aside class="space-y-6">
                <div class="bg-slate-900 p-6 rounded-xl border border-slate-800">
                    <h2 class="text-lg font-semibold mb-4 flex justify-between">
                        <span>🔑 OpenRouter Key</span>
                        <span id="key-status-icon" class="text-slate-500">❌</span>
                    </h2>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-xs uppercase text-slate-500 font-bold mb-1">API Key</label>
                            <input type="password" id="openrouter-key" class="w-full bg-slate-950 border border-slate-700 rounded p-2 text-sm focus:border-sky-500 outline-none" placeholder="sk-or-...">
                            <a href="https://openrouter.ai/keys" target="_blank" class="text-[10px] text-sky-500 hover:underline">Get free key here</a>
                        </div>
                        <button id="save-btn" class="w-full bg-slate-800 hover:bg-slate-700 text-white font-bold py-2 rounded transition">
                            Save Locally
                        </button>
                    </div>
                </div>

                <div class="bg-slate-900 p-6 rounded-xl border border-slate-800">
                    <h2 class="text-lg font-semibold mb-4 text-sky-400">🚀 New Project</h2>
                    <textarea id="project-desc" rows="6" class="w-full bg-slate-950 border border-slate-700 rounded p-3 text-sm focus:border-sky-500 outline-none" placeholder="Describe your app idea in detail..."></textarea>
                    <button id="start-team" class="w-full mt-4 bg-sky-600 hover:bg-sky-500 text-white font-bold py-3 rounded transition shadow-lg shadow-sky-900/20 disabled:opacity-50">
                        Summon the Team
                    </button>
                </div>
            </aside>

            <main class="lg:col-span-2 space-y-6">
                <div class="bg-slate-900 rounded-xl border border-slate-800 flex flex-col h-[300px]">
                    <div class="p-4 border-b border-slate-800 bg-slate-800/30 rounded-t-xl flex justify-between">
                        <h2 class="text-xs font-bold uppercase tracking-widest">Execution Log</h2>
                        <span id="loader" class="hidden text-sky-500 text-xs animate-pulse">PROCCESSING</span>
                    </div>
                    <div id="activity-log" class="flex-1 overflow-y-auto p-4 space-y-3 text-sm font-mono">
                        <div class="text-slate-500 italic">Configure your OpenRouter key to begin...</div>
                    </div>
                </div>

                <div class="bg-black rounded-xl border border-slate-800 flex flex-col min-h-[450px]">
                    <div class="p-3 bg-slate-900 border-b border-slate-800 flex justify-between items-center">
                        <span class="text-xs font-bold text-slate-400">GENERTED_ARTIFACT.HTML</span>
                        <button id="copy-code" class="text-xs px-3 py-1 rounded bg-slate-800 hover:bg-slate-700">Copy Code</button>
                    </div>
                    <pre id="code-output" class="p-6 text-sm code-font overflow-auto flex-1 text-sky-300/90 leading-relaxed"><code>// Ready for your first prompt.</code></pre>
                </div>
            </main>
        </div>
    </div>

    <script>
        const activityLog = document.getElementById('activity-log');
        const codeOutput = document.getElementById('code-output');
        const btnStart = document.getElementById('start-team');
        const loader = document.getElementById('loader');
        let apiKey = '';

        window.onload = () => {
            const saved = localStorage.getItem('or_vault');
            if (saved) {
                apiKey = saved;
                document.getElementById('openrouter-key').value = saved;
                updateKeyUI(true);
            }
        };

        document.getElementById('save-btn').addEventListener('click', () => {
            apiKey = document.getElementById('openrouter-key').value.trim();
            localStorage.setItem('or_vault', apiKey);
            updateKeyUI(!!apiKey);
            addLog('SYSTEM', 'Key updated.', 'text-green-400');
        });

        function updateKeyUI(ready) {
            document.getElementById('status-pill').innerHTML = ready ? '🟢 Ready' : '⚪ Missing Key';
            document.getElementById('key-status-icon').innerText = ready ? '✅' : '❌';
        }

        function addLog(role, message, colorClass, isThinking = false) {
            const div = document.createElement('div');
            div.className = `p-3 rounded bg-slate-950/50 border-l-2 border-slate-700 ${colorClass} text-xs`;
            div.innerHTML = `<span class="font-bold text-slate-500 mb-1 block uppercase">${role}</span><span class="${isThinking ? 'typing-indicator' : ''}">${message}</span>`;
            activityLog.appendChild(div);
            activityLog.scrollTop = activityLog.scrollHeight;
            return div;
        }

        async function callAI(model, system, user, retries = 5) {
            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${apiKey}`,
                            'Content-Type': 'application/json',
                            'HTTP-Referer': window.location.origin,
                            'X-Title': 'AI Team Orchestrator'
                        },
                        body: JSON.stringify({
                            model: model,
                            messages: [
                                { role: 'system', content: system },
                                { role: 'user', content: user }
                            ],
                            temperature: 0.5
                        })
                    });

                    if (!response.ok) {
                        const err = await response.json();
                        throw new Error(err.error?.message || `HTTP ${response.status}`);
                    }
                    const data = await response.json();
                    if (!data.choices || data.choices.length === 0) throw new Error("Empty response from model");
                    return data.choices[0].message.content;
                } catch (err) {
                    if (i === retries - 1) throw err;
                    const delay = Math.pow(2, i) * 1000;
                    await new Promise(resolve => setTimeout(resolve, delay));
                }
            }
        }

        btnStart.addEventListener('click', async () => {
            const desc = document.getElementById('project-desc').value.trim();
            if (!desc || !apiKey) return alert("Check your prompt and API key.");

            btnStart.disabled = true;
            loader.classList.remove('hidden');
            activityLog.innerHTML = "";
            codeOutput.innerText = "// Working...";

            try {
                // ARCHITECT
                addLog('ARCHITECT (Llama 3.3)', 'Designing technical blueprint...', 'text-purple-400', true);
                const plan = await callAI(
                    'meta-llama/llama-3.3-70b-instruct:free',
                    'You are a systems architect. Create a step-by-step implementation plan for a single-file HTML/JS web app. Be concise.',
                    desc
                );
                addLog('SYSTEM', 'Architectural plan received.', 'text-slate-500');

                // LEAD CODER
                addLog('LEAD CODER (DeepSeek R1)', 'Translating blueprint into code...', 'text-sky-400', true);
                const code = await callAI(
                    'deepseek/deepseek-r1:free',
                    'You are an expert coder. Output ONLY the raw HTML code (including CSS/JS) for the app. No markdown, no intro text, no backticks.',
                    `Build this app based on this plan: ${plan}`
                );

                const cleanCode = code.replace(/```html|```/gi, '').trim();
                codeOutput.innerText = cleanCode;
                addLog('SYSTEM', 'Project complete. Code emitted to artifact window.', 'text-green-400');

            } catch (e) {
                addLog('ERROR', `Connection failed: ${e.message}. Please check your key or try again in a moment.`, 'text-red-500');
                codeOutput.innerText = "// Generation failed. Check log for details.";
            } finally {
                btnStart.disabled = false;
                loader.classList.add('hidden');
            }
        });

        document.getElementById('copy-code').addEventListener('click', () => {
            navigator.clipboard.writeText(codeOutput.innerText);
            alert("Code copied!");
        });
    </script>
</body>
</html>
