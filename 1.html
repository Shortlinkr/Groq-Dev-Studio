<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Team | Serverless Dev Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code&family=Inter:wght@400;600&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f1f5f9; }
        .code-font { font-family: 'Fira Code', monospace; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 4px; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-8 border-b border-slate-800 pb-4">
            <div>
                <h1 class="text-2xl font-bold text-sky-400">AI Team Orchestrator</h1>
                <p class="text-slate-400 text-sm">Serverless multi-agent coding environment</p>
            </div>
            <div id="status-pill" class="px-3 py-1 rounded-full bg-slate-800 text-xs border border-slate-700">
                ⚪ Waiting for Keys
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Left Column: Config & Keys -->
            <aside class="space-y-6">
                <div class="bg-slate-900 p-6 rounded-xl border border-slate-800">
                    <h2 class="text-lg font-semibold mb-4">🔑 API Keys</h2>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-xs uppercase text-slate-500 font-bold mb-1">Groq Key (Free Tier)</label>
                            <input type="password" id="groq-key" class="w-full bg-slate-950 border border-slate-700 rounded p-2 text-sm focus:border-sky-500 outline-none" placeholder="gsk_...">
                            <a href="https://console.groq.com/keys" target="_blank" class="text-[10px] text-sky-500 hover:underline">Get from Groq Console</a>
                        </div>
                        <div>
                            <label class="block text-xs uppercase text-slate-500 font-bold mb-1">OpenRouter Key (Free Models)</label>
                            <input type="password" id="openrouter-key" class="w-full bg-slate-950 border border-slate-700 rounded p-2 text-sm focus:border-sky-500 outline-none" placeholder="sk-or-...">
                            <a href="https://openrouter.ai/keys" target="_blank" class="text-[10px] text-sky-500 hover:underline">Get from OpenRouter</a>
                        </div>
                        <button id="save-btn" class="w-full bg-sky-600 hover:bg-sky-500 text-white font-bold py-2 rounded transition shadow-lg shadow-sky-900/20">
                            Save to Browser
                        </button>
                    </div>
                </div>

                <div class="bg-slate-900 p-6 rounded-xl border border-slate-800">
                    <h2 class="text-lg font-semibold mb-4">🏠 Project Metadata</h2>
                    <input type="text" id="project-name" class="w-full bg-slate-950 border border-slate-700 rounded p-2 text-sm mb-4" placeholder="Project Name (e.g. My Website)">
                    <textarea id="project-desc" rows="4" class="w-full bg-slate-950 border border-slate-700 rounded p-2 text-sm" placeholder="Describe your wild idea in detail..."></textarea>
                    <button id="start-team" class="w-full mt-4 border border-sky-500 text-sky-400 hover:bg-sky-500/10 font-bold py-2 rounded transition">
                        Summon the Team
                    </button>
                </div>
            </aside>

            <!-- Middle/Right Column: Team Log and Code Output -->
            <main class="lg:col-span-2 space-y-6">
                <!-- Team Activity -->
                <div class="bg-slate-900 rounded-xl border border-slate-800 flex flex-col h-[400px]">
                    <div class="p-4 border-b border-slate-800 flex justify-between items-center">
                        <h2 class="text-lg font-semibold">🗨️ Team Debate</h2>
                        <span class="text-xs text-slate-500">Activity Log</span>
                    </div>
                    <div id="activity-log" class="flex-1 overflow-y-auto p-4 space-y-3 text-sm">
                        <div class="text-slate-500 italic">Configure keys and describe your project to begin...</div>
                    </div>
                </div>

                <!-- Code Display -->
                <div class="bg-black rounded-xl border border-slate-800 overflow-hidden">
                    <div class="p-3 bg-slate-900 border-b border-slate-800 flex justify-between items-center">
                        <span class="text-xs font-bold uppercase text-slate-400">Final Code Preview</span>
                        <button id="copy-code" class="text-xs text-sky-500 hover:text-sky-400">Copy to Clipboard</button>
                    </div>
                    <pre id="code-output" class="p-6 text-sm code-font overflow-x-auto min-h-[300px] text-green-400"><code>// No code generated yet.</code></pre>
                </div>
            </main>
        </div>
    </div>

    <script>
        const statusPill = document.getElementById('status-pill');
        const activityLog = document.getElementById('activity-log');
        const codeOutput = document.getElementById('code-output');

        // Initial Load
        window.addEventListener('DOMContentLoaded', () => {
            const saved = localStorage.getItem('ai_dev_vault');
            if (saved) {
                const keys = JSON.parse(saved);
                document.getElementById('groq-key').value = keys.groq || '';
                document.getElementById('openrouter-key').value = keys.openrouter || '';
                updateStatus(true);
            }
        });

        // Save Keys
        document.getElementById('save-btn').addEventListener('click', () => {
            const keys = {
                groq: document.getElementById('groq-key').value,
                openrouter: document.getElementById('openrouter-key').value
            };
            localStorage.setItem('ai_dev_vault', JSON.stringify(keys));
            updateStatus(true);
            addLog('System', 'API keys saved securely to local storage.', 'text-sky-400');
        });

        function updateStatus(ready) {
            statusPill.innerHTML = ready ? '🟢 Team Ready' : '⚪ Waiting for Keys';
            statusPill.className = `px-3 py-1 rounded-full text-xs border ${ready ? 'bg-green-900/20 border-green-700 text-green-400' : 'bg-slate-800 border-slate-700 text-slate-400'}`;
        }

        function addLog(role, message, colorClass) {
            const div = document.createElement('div');
            div.className = `p-3 rounded bg-slate-950 border-l-4 border-slate-800 ${colorClass}`;
            div.innerHTML = `<span class="font-bold uppercase text-[10px] block opacity-70">${role}</span>${message}`;
            activityLog.appendChild(div);
            activityLog.scrollTop = activityLog.scrollHeight;
        }

        // Dummy Trigger for next steps
        document.getElementById('start-team').addEventListener('click', () => {
            const desc = document.getElementById('project-desc').value;
            if (!desc) return alert("Please describe your project first!");
            
            addLog('System', 'Initializing team protocols...', 'text-white');
            addLog('Architect (Llama 4)', `Analyzing request: "${desc}"`, 'text-sky-400');
            
            // This is where we will hook up the fetch requests in the next stage
            setTimeout(() => {
                addLog('Lead Coder (DeepSeek)', 'Architecting the file structure and logic...', 'text-orange-400');
            }, 1000);
        });

        document.getElementById('copy-code').addEventListener('click', () => {
            const code = codeOutput.innerText;
            const textarea = document.createElement('textarea');
            textarea.value = code;
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand('copy');
            document.body.removeChild(textarea);
            alert("Code copied!");
        });
    </script>
</body>
</html>
